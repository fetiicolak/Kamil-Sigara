    /* ── GRADIENT OVERLAY ── */
    #overlay {
      position: fixed; inset: 0; z-index: 1;
      background: linear-gradient(
        to bottom,
        rgba(10,22,40,0.35) 0%,
        rgba(10,22,40,0.0) 30%,
        rgba(10,22,40,0.0) 60%,
        rgba(10,22,40,0.92) 100%
      );
    }

    /* ── MAIN CONTAINER ── */
    #app {
      position: relative; z-index: 2;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: space-between;
      padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 30px);
      padding-top: max(env(safe-area-inset-top), 28px);
    }

    /* ── TOP BADGE ── */
    #top-badge {
      text-align: center;
      opacity: 0;
      animation: fadeUp 1s ease 0.3s forwards;
    }

    #top-badge .smoke-icon {
      font-size: 2.2rem;
      display: block;
      filter: drop-shadow(0 0 12px rgba(240,192,64,0.6));
      animation: breathe 4s ease-in-out infinite;
    }

    #top-badge .tagline {
      margin-top: 6px;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold-dim);
      font-weight: 600;
    }

    /* ── MAIN TIMER BLOCK ── */
    #timer-block {
      text-align: center;
      opacity: 0;
      animation: fadeUp 1s ease 0.6s forwards;
    }

    #day-count {
      font-size: clamp(5rem, 22vw, 9rem);
      font-weight: 800;
      color: var(--gold);
      line-height: 1;
      letter-spacing: -0.03em;
      text-shadow: 0 0 40px rgba(240,192,64,0.4), 0 0 80px rgba(240,192,64,0.15);
      font-variant-numeric: tabular-nums;
    }

    #day-label {
      font-size: clamp(1rem, 4vw, 1.3rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--white-dim);
      margin-top: 4px;
      font-weight: 500;
    }

    /* ── HH:MM:SS ── */
    #hms {
      margin-top: 14px;
      font-size: clamp(2rem, 8vw, 3.2rem);
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--white);
      font-variant-numeric: tabular-nums;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }

    /* ── STATS GRID ── */
    #stats {
      width: 100%; max-width: 400px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      opacity: 0;
      animation: fadeUp 1s ease 0.9s forwards;
    }

    .stat-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(240,192,64,0.18);
      border-radius: 16px;
      padding: 14px 16px;
      text-align: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(240,192,64,0.35), transparent);
    }

    .stat-icon {
      font-size: 1.4rem;
      display: block;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: clamp(1.4rem, 5.5vw, 2rem);
      font-weight: 700;
      color: var(--gold);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--white-dim);
      margin-top: 4px;
      font-weight: 500;
    }

    /* ── MILESTONE BANNER ── */
    #milestone {
      width: 100%; max-width: 400px;
      background: linear-gradient(135deg, rgba(240,192,64,0.18), rgba(240,192,64,0.06));
      border: 1px solid rgba(240,192,64,0.35);
      border-radius: 14px;
      padding: 12px 18px;
      text-align: center;
      opacity: 0;
      animation: fadeUp 1s ease 1.2s forwards;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    #milestone-text {
      font-size: 0.82rem;
      color: var(--gold);
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.12); }
    }

    @keyframes pulse-gold {
      0%, 100% { box-shadow: 0 0 0 0 rgba(240,192,64,0); }
      50%       { box-shadow: 0 0 20px 4px rgba(240,192,64,0.2); }
    }

    .stat-card.highlight {
      animation: pulse-gold 3s ease-in-out infinite;
    }

@media (min-width: 500px) {
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }
  #bg, #overlay, #app {
    max-width: 390px;
    max-height: 844px;
    border-radius: 40px;
  }
  #bg {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
  }
  #overlay {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
  }
}

<body>

<div id="bg"></div>
<div id="overlay"></div>

<div id="app">
  <!-- TOP -->
  <div id="top-badge">
    <span class="smoke-icon">🚭</span>
    <span class="tagline">Temiz Nefes · Özgür Hayat</span>
  </div>

  <!-- MAIN TIMER -->
  <div id="timer-block">
    <div id="day-count">0</div>
    <div id="day-label">Gün Sigarasız</div>
    <div id="hms">00:00:00</div>
  </div>

  <!-- STATS -->
  <div id="stats">
    <div class="stat-card">
      <span class="stat-icon">🚬</span>
      <div class="stat-value" id="no-cig">0</div>
      <div class="stat-label">İçilmeyen Sigara</div>
    </div>
    <div class="stat-card highlight">
      <span class="stat-icon">💰</span>
      <div class="stat-value" id="money">₺0</div>
      <div class="stat-label">Biriken Para</div>
    </div>
    <div class="stat-card">
      <span class="stat-icon">❤️</span>
      <div class="stat-value" id="life-min">0</div>
      <div class="stat-label">Kazanılan Dakika</div>
    </div>
    <div class="stat-card">
      <span class="stat-icon">🌬️</span>
      <div class="stat-value" id="breaths">0</div>
      <div class="stat-label">Temiz Nefes</div>
    </div>
  </div>

  <!-- MILESTONE -->
  <div id="milestone">
    <div id="milestone-text">🏆 Her an bir zafer!</div>
  </div>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────────
  const QUIT_DATE      = new Date('2026-06-14T13:00:00');
  const CIG_PER_DAY    = 20;      // günlük sigara sayısı (ortalama)
  const PACK_PRICE     = 115;     // paket fiyatı TL
  const MINS_PER_CIG   = 11;      // bir sigara kaç dakika ömür götürür
  const BREATHS_PER_MIN = 16;     // dakikada nefes sayısı

  // ── MILESTONE MESSAGES ──────────────────────────────────────
  const milestones = [
    { days: 0,   msg: '🔥 İlk adım atıldı — en zor an bu!' },
    { days: 1,   msg: '🌅 1 Gün! Nikotin kanından çıkıyor.' },
    { days: 2,   msg: '👃 2 Gün! Koku ve tat geri geliyor.' },
    { days: 3,   msg: '💪 3 Gün! Nikotin tamamen temizlendi.' },
    { days: 7,   msg: '🌟 1 Hafta! Akciğerler iyileşmeye başladı.' },
    { days: 14,  msg: '🏃 2 Hafta! Kan dolaşımı normale döndü.' },
    { days: 21,  msg: '🧠 3 Hafta! Alışkanlık kırılıyor!' },
    { days: 30,  msg: '🎉 1 Ay! Mucizevi bir başarı!' },
    { days: 60,  msg: '✨ 2 Ay! Öksürük azalıyor, nefes açılıyor.' },
    { days: 90,  msg: '🦋 3 Ay! Akciğer kapasitesi %30 arttı.' },
    { days: 180, msg: '🌈 6 Ay! Sağlık iyileşmesi belirginleşiyor.' },
    { days: 365, msg: '🏆 1 YIL! Kalp hastalığı riski yarıya düştü!' },
  ];

  function getMilestoneMsg(days) {
    let msg = milestones[0].msg;
    for (const m of milestones) {
      if (days >= m.days) msg = m.msg;
      else break;
    }
    return msg;
  }

  // ── FORMAT HELPERS ──────────────────────────────────────────
  function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }

  function formatNum(n) {
    if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
    if (n >= 10000)   return Math.floor(n/1000) + 'K';
    return Math.floor(n).toLocaleString('tr-TR');
  }

  // ── UPDATE ──────────────────────────────────────────────────
  function update() {
    const now     = new Date();
    const diffMs  = now - QUIT_DATE;
    if (diffMs < 0) return; // henüz başlamamış

    const totalSec  = Math.floor(diffMs / 1000);
    const totalMins = diffMs / 60000;
    const totalHrs  = diffMs / 3600000;

    const days  = Math.floor(totalHrs / 24);
    const hrs   = Math.floor(totalHrs % 24);
    const mins  = Math.floor(totalMins % 60);
    const secs  = totalSec % 60;

    // sigara / gün baz
    const cigsPerMin  = CIG_PER_DAY / (24 * 60);
    const noCig       = Math.floor(totalMins * cigsPerMin);
    const money       = Math.floor((noCig / 20) * PACK_PRICE);
    const lifeMin     = Math.floor(noCig * MINS_PER_CIG);
    const breaths     = Math.floor(totalMins * BREATHS_PER_MIN);

    // DOM
    document.getElementById('day-count').textContent = days;
    document.getElementById('hms').textContent =
      `${pad(hrs)}:${pad(mins)}:${pad(secs)}`;

    document.getElementById('no-cig').textContent  = formatNum(noCig);
    document.getElementById('money').textContent   = '₺' + formatNum(money);
    document.getElementById('life-min').textContent = formatNum(lifeMin);
    document.getElementById('breaths').textContent = formatNum(breaths);

    document.getElementById('milestone-text').textContent = getMilestoneMsg(days);
  }

  update();
  setInterval(update, 1000);

  // ── PWA MANIFEST (inline) ────────────────────────────────────
  const manifestData = {
    name: 'Temiz Nefes',
    short_name: 'Temiz Nefes',
    description: 'Sigara bırakma takip uygulaması',
    start_url: '.',
    display: 'standalone',
    background_color: '#0a1628',
    theme_color: '#0a1628',
    orientation: 'portrait',
    icons: [
      { src: buildIcon(192), sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
      { src: buildIcon(512), sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
    ]
  };

  function buildIcon(size) {
    const canvas = document.createElement('canvas');
    canvas.width = canvas.height = size;
    const ctx = canvas.getContext('2d');

    // Background gradient
    const grad = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
    grad.addColorStop(0, '#1e3a6e');
    grad.addColorStop(1, '#0a1628');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(0, 0, size, size, size * 0.22);
    ctx.fill();

    // Gold ring
    ctx.strokeStyle = '#f0c040';
    ctx.lineWidth = size * 0.025;
    ctx.beginPath();
    ctx.arc(size/2, size/2, size * 0.38, 0, Math.PI * 2);
    ctx.stroke();

    // Emoji
    ctx.font = `${size * 0.38}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🚭', size/2, size/2 + size*0.02);

    return canvas.toDataURL('image/png');
  }

  const blob = new Blob([JSON.stringify(manifestData)], { type: 'application/json' });
  const manifestURL = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = manifestURL;
  document.head.appendChild(link);
  document.getElementById('manifest-placeholder').remove();

  // Apple Touch Icon
  const appleIcon = document.createElement('link');
  appleIcon.rel = 'apple-touch-icon';
  appleIcon.href = buildIcon(180);
  document.head.appendChild(appleIcon);

  // Favicon
  const favicon = document.createElement('link');
  favicon.rel = 'icon';
  favicon.href = buildIcon(64);
  document.head.appendChild(favicon);
</script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
      });
    }
  </script>
